body:
  text: 黃陵廟記僕躬耕南陽之畝遂蒙劉氏顧草廬勢不可郤計事善之于是情好日密相拉總師趨蜀道履黃牛因覩江山之勝亂石排空驚濤拍岸斂巨石于江中崔嵬巑岏列作三峰平治洚水順遵其道非神扶助于禹人力奚能至此耶僕縱步環覽乃見江左大山壁立林麓峰巒如畫熟視於大江重復石壁間有神像影現焉鬢髮鬚眉冠裳宛然如彩畫者前豎一旌旗右駐一黃犢猶有董工開道之勢古傳所載黃龍助禹開江治水九載而功成信不誣也惜乎廟貌廢壞使人太息神有功助禹開江不事鑿斧順濟舟航當廟食茲土僕復而興之再建其廟貌目之曰黃牛廟以顯神功
